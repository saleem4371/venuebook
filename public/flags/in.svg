<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Saffron / orange stripe -->
  <rect width="900" height="200" fill="#FF9933"/>
  <!-- White stripe -->
  <rect y="200" width="900" height="200" fill="#FFFFFF"/>
  <!-- India green stripe -->
  <rect y="400" width="900" height="200" fill="#138808"/>
  <!-- Ashoka Chakra — navy outer ring -->
  <circle cx="450" cy="300" r="82" fill="none" stroke="#000080" stroke-width="9"/>
  <!-- 24 spokes via rotate transform -->
  <g stroke="#000080" stroke-width="4" transform="translate(450,300)">
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(0)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(15)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(30)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(45)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(60)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(75)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(90)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(105)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(120)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(135)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(150)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(165)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(180)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(195)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(210)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(225)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(240)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(255)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(270)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(285)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(300)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(315)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(330)"/>
    <line x1="0" y1="-16" x2="0" y2="-82" transform="rotate(345)"/>
  </g>
  <!-- Chakra hub dot -->
  <circle cx="450" cy="300" r="16" fill="#000080"/>
</svg>
